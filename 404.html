<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  // Only redirect if we haven't already (prevents infinite loop)
  if (!sessionStorage.getItem('ghRedirect')) {
    sessionStorage.setItem('ghRedirect', window.location.pathname);
    window.location.replace('https://growcery.shop/');
  }
</script>
</head>
<body></body>
</html>
